<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETLYNX Dashboard</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#121212',
                            card: '#1e1e1e',
                            text: '#aaaaaa',
                            heading: '#ffffff',
                            border: '#2e2e2e'
                        },
                        brand: {
                            500: '#ac6aff',
                            400: '#d7a1ff'
                        },
                        accent: {
                            blue: '#3b82f6',
                            yellow: '#eab308',
                            green: '#22c55e',
                            red: '#ef4444'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #121212; color: #ffffff; margin: 0; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 10px; }
        
        .loader {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-left-color: #ac6aff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <!-- Recharts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.1.12/Recharts.min.js"></script>
</head>
<body class="bg-dark-bg text-dark-heading selection:bg-brand-500/30 antialiased overflow-hidden">
    <div id="root"></div>

    <script type="application/template" id="flask-data">
        {
            "scripts": {{ scripts | tojson | safe }},
            "ipAddress": "{{ ip_address }}",
            "token": "{{ token or '' }}"
        }
    </script>
    <script>
        window.flaskData = JSON.parse(document.getElementById('flask-data').textContent);
    </script>
    <script type="text/babel">
        // {% raw %}
        const { useState, useEffect, useCallback } = React;
        const { LineChart, Line, ResponsiveContainer, PieChart, Pie, Cell, XAxis, YAxis, Tooltip, CartesianGrid } = window.Recharts;

        // Custom Icons 
        const Icons = {
            Activity: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
            Server: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01" /></svg>,
            Cpu: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" /></svg>,
            Wifi: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0" /></svg>,
            Play: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Video: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
        };

        const Card = ({ children, className = "" }) => (
            <div className={`bg-dark-card rounded-2xl p-6 shadow-lg border border-dark-border flex flex-col ${className}`}>
                {children}
            </div>
        );

        const buildUrl = (path) => {
            return `${path}${path.includes('?') ? '&' : '?'}token=${window.flaskData.token}`;
        };

        const ToastContainer = ({ toasts }) => (
            <div className="fixed bottom-6 right-6 z-[999] flex flex-col gap-3 pointer-events-none">
                {toasts.map(toast => (
                    <div key={toast.id} className={`pointer-events-auto flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl text-white font-medium transform transition-all border border-dark-border ${toast.type === 'error' ? 'bg-accent-red/20 text-accent-red border-accent-red/30' : 'bg-brand-500/20 text-brand-400 border-brand-500/30'}`}>
                        {toast.type === 'error' ? '❌' : '✅'}
                        {toast.message}
                    </div>
                ))}
            </div>
        );

        // Sub-Views
        const DashboardView = ({ stats, openScreenShare, scripts, handleRun, loadingScript }) => (
            <div className="h-full flex flex-col gap-6 overflow-y-auto pr-2 pb-10">
                <div className="flex justify-between items-center mb-2">
                    <h2 className="text-2xl font-bold">Dashboard Overview</h2>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <Card>
                        <span className="text-dark-text font-medium text-sm mb-4 flex items-center gap-2">
                            <span className="w-2 h-2 rounded-full bg-accent-green"></span>
                            System Health
                        </span>
                        <div className="text-3xl font-bold mb-1">Optimal</div>
                        <div className="text-sm text-accent-green font-medium">Online & Monitored</div>
                    </Card>
                    <Card>
                        <span className="text-dark-text font-medium text-sm mb-4 flex items-center gap-2">
                            <span className="w-2 h-2 rounded-full bg-accent-blue"></span>
                            Network
                        </span>
                        <div className="text-3xl font-bold mb-1">Connected</div>
                        <div className="text-sm text-accent-blue font-medium">{window.flaskData.ipAddress}</div>
                    </Card>
                    <Card>
                        <span className="text-dark-text font-medium text-sm mb-4 flex items-center gap-2">
                            <span className="w-2 h-2 rounded-full bg-brand-500"></span>
                            Memory Usage
                        </span>
                        <div className="text-3xl font-bold mb-1">{stats ? `${stats.memory_percent}%` : '--'}</div>
                        <div className="text-sm text-dark-text font-medium">{stats ? `${(stats.memory_used / 1024 / 1024 / 1024).toFixed(1)} GB used` : 'Loading...'}</div>
                    </Card>
                    <Card>
                        <span className="text-dark-text font-medium text-sm mb-4 flex items-center gap-2">
                            <span className="w-2 h-2 rounded-full bg-accent-yellow"></span>
                            CPU Load
                        </span>
                        <div className="text-3xl font-bold mb-1">{stats ? `${stats.cpu}%` : '--'}</div>
                        <div className="text-sm text-dark-text font-medium">Global Average</div>
                    </Card>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-2">
                    <Card className="lg:col-span-2">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="font-bold text-lg">System Operations</h3>
                            <button onClick={openScreenShare} className="flex items-center gap-2 px-4 py-2 bg-brand-500 hover:bg-brand-400 text-white font-semibold rounded-lg transition-colors shadow-lg shadow-brand-500/20">
                                <Icons.Video /> Start Screen Share
                            </button>
                        </div>
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                            {scripts.filter(s => s !== "Screen Share").map(script => (
                                <button
                                    key={script}
                                    onClick={() => handleRun(script)}
                                    disabled={loadingScript === script}
                                    className="flex items-center justify-center gap-2 py-4 px-3 rounded-xl transition-all shadow-sm bg-dark-bg border border-dark-border hover:border-brand-500 disabled:opacity-50 text-sm font-semibold"
                                >
                                    {loadingScript === script ? (
                                        <div className="loader" />
                                    ) : (
                                        <Icons.Play />
                                    )}
                                    {loadingScript === script ? 'Running...' : script}
                                </button>
                            ))}
                        </div>
                    </Card>
                    <Card>
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-bold text-lg">Storage (C:\)</h3>
                        </div>
                        {stats ? (
                            <div className="flex flex-col items-center justify-center flex-1">
                                <div className="text-4xl font-bold mb-2">{stats.disk_percent}%</div>
                                <div className="text-sm text-dark-text mb-6">Drive Capacity Used</div>
                                
                                <div className="w-full bg-dark-bg rounded-full h-3 mb-2 overflow-hidden border border-dark-border">
                                    <div className="bg-accent-blue h-full rounded-full" style={{ width: `${stats.disk_percent}%` }}></div>
                                </div>
                                <div className="flex justify-between w-full text-xs text-dark-text">
                                    <span>{(stats.disk_used / 1024 / 1024 / 1024).toFixed(1)} GB</span>
                                    <span>{(stats.disk_total / 1024 / 1024 / 1024).toFixed(1)} GB Total</span>
                                </div>
                            </div>
                        ) : (
                            <div className="flex flex-col items-center justify-center flex-1 text-dark-text">Loading...</div>
                        )}
                    </Card>
                </div>
            </div>
        );

        const HardwareView = ({ stats, cpuHistory }) => {
            const DONUT_COLORS_MEM = ['#ac6aff', '#2e2e2e'];
            const memData = stats ? [{name:'Used', value: stats.memory_percent}, {name:'Free', value: 100 - stats.memory_percent}] : [];

            return (
                <div className="h-full flex flex-col gap-6 overflow-y-auto pr-2 pb-10">
                    <h2 className="text-2xl font-bold mb-2">Hardware Diagnostics</h2>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <Card className="lg:col-span-2 min-h-[400px]">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="font-bold text-lg flex items-center gap-2">
                                    <Icons.Cpu /> Live CPU Telemetry
                                </h3>
                            </div>
                            <div className="h-72 w-full">
                                {cpuHistory.length > 0 ? (
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={cpuHistory} margin={{ top: 5, right: 20, left: -20, bottom: 5 }}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#2e2e2e" vertical={false} />
                                            <XAxis dataKey="time" stroke="#aaaaaa" tick={{ fontSize: 12, fill: '#aaaaaa' }} tickMargin={10} />
                                            <YAxis type="number" domain={[0, 100]} stroke="#aaaaaa" tick={{ fontSize: 12, fill: '#aaaaaa' }} axisLine={false} tickLine={false} />
                                            <Tooltip contentStyle={{ borderRadius: '12px', backgroundColor: '#1e1e1e', border: '1px solid #2e2e2e', color: '#fff' }} itemStyle={{ color: '#ac6aff' }} />
                                            <Line type="monotone" dataKey="cpu" name="CPU %" stroke="#ac6aff" strokeWidth={3} dot={false} isAnimationActive={false} />
                                        </LineChart>
                                    </ResponsiveContainer>
                                ) : (
                                    <div className="flex h-full items-center justify-center text-dark-text">Loading telemetry...</div>
                                )}
                            </div>
                        </Card>

                        <div className="flex flex-col gap-6">
                            <Card className="flex flex-col relative items-center justify-center flex-1">
                                <h3 className="font-bold text-lg mb-6 w-full text-left">RAM Profile</h3>
                                <div className="h-32 w-full relative mb-4">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <PieChart>
                                            <Pie data={memData} innerRadius={45} outerRadius={60} dataKey="value" stroke="none" isAnimationActive={false}>
                                                {memData.map((e, index) => <Cell key={`cell-${index}`} fill={DONUT_COLORS_MEM[index]} />)}
                                            </Pie>
                                        </PieChart>
                                    </ResponsiveContainer>
                                    <div className="absolute inset-0 flex items-center justify-center flex-col">
                                        <span className="text-xl font-bold">{stats ? `${stats.memory_percent}%` : '--'}</span>
                                    </div>
                                </div>
                            </Card>
                        </div>
                    </div>

                    <Card className="flex-1">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="font-bold text-lg flex items-center gap-2"><Icons.Activity /> Memory Intense Processes</h3>
                        </div>
                        <div className="w-full overflow-x-auto">
                            <table className="w-full text-sm text-left">
                                <thead>
                                    <tr className="text-dark-text font-medium border-b border-dark-border">
                                        <th className="pb-4 pt-1 px-4 text-xs font-semibold uppercase tracking-wider">PID</th>
                                        <th className="pb-4 pt-1 px-4 text-xs font-semibold uppercase tracking-wider">Name</th>
                                        <th className="pb-4 pt-1 px-4 text-xs font-semibold uppercase tracking-wider text-right">RAM %</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {stats?.processes?.map((proc) => (
                                        <tr key={proc.pid} className="border-b border-dark-border/50 last:border-0 hover:bg-dark-bg/50 transition-colors">
                                            <td className="py-4 px-4 text-dark-text font-mono text-xs">{proc.pid}</td>
                                            <td className="py-4 px-4 font-semibold text-xs text-white">{proc.name}</td>
                                            <td className="py-4 px-4 font-bold text-brand-400 text-right">{proc.memory}%</td>
                                        </tr>
                                    ))}
                                    {!stats && <tr><td colSpan="3" className="text-center py-8 text-dark-text">Loading processes...</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </Card>
                </div>
            );
        };

        const NetworkView = ({ stats }) => (
            <div className="h-full flex flex-col gap-6 overflow-y-auto pr-2 pb-10">
                <h2 className="text-2xl font-bold mb-2">Network Configuration</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <Card>
                        <div className="flex items-center gap-4 mb-6">
                            <div className="p-3 bg-accent-blue/20 rounded-xl text-accent-blue">
                                <Icons.Wifi />
                            </div>
                            <div>
                                <h3 className="font-bold text-lg">Local IP Address</h3>
                                <p className="text-dark-text text-sm">Active Interface</p>
                            </div>
                        </div>
                        <div className="text-4xl font-mono tracking-wider font-bold text-white mb-2">{window.flaskData.ipAddress}</div>
                        <p className="text-sm text-dark-text mt-4">This allows local web interface access and dashboard operation.</p>
                    </Card>
                    <Card>
                        <div className="flex items-center gap-4 mb-6">
                            <div className="p-3 bg-accent-green/20 rounded-xl text-accent-green">
                                <Icons.Server />
                            </div>
                            <div>
                                <h3 className="font-bold text-lg">Backend Status</h3>
                                <p className="text-dark-text text-sm">Flask Connectivity</p>
                            </div>
                        </div>
                        <div className="text-2xl font-bold text-accent-green mb-2">
                            {stats?.network_connected ? "Online & Polling" : "Loading..."}
                        </div>
                        <p className="text-sm text-dark-text mt-4">Periodic data fetching is active mapping System UI directly to the backend layer securely.</p>
                    </Card>
                </div>
            </div>
        );

        // Sidebar Navigation
        const Sidebar = ({ activeTab, setActiveTab }) => {
            const navItems = [
                { id: 'dashboard', name: 'Dashboard', icon: Icons.Activity },
                { id: 'hardware', name: 'Hardware', icon: Icons.Cpu },
                { id: 'network', name: 'Network', icon: Icons.Wifi }
            ];

            return (
                <div className="w-64 bg-dark-card border-r border-dark-border flex flex-col h-screen flex-shrink-0">
                    <div className="p-8">
                        <h1 className="text-3xl font-bold flex items-center gap-3 text-white tracking-tight">
                            <span className="text-brand-500 text-4xl leading-none">❖</span> NETLYNX
                        </h1>
                    </div>
                    <nav className="flex-1 px-4 space-y-2 mt-4">
                        {navItems.map((item) => (
                            <button 
                                key={item.id} 
                                onClick={() => setActiveTab(item.id)}
                                className={`w-full flex items-center gap-4 px-5 py-4 rounded-xl transition-all font-medium text-sm ${
                                    activeTab === item.id 
                                    ? 'bg-brand-500 text-white shadow-lg shadow-brand-500/20' 
                                    : 'text-dark-text hover:bg-dark-bg hover:text-white'
                                }`}
                            >
                                <item.icon /> {item.name}
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const ScreenShareModal = ({ isOpen, onClose, addToast }) => {
            const [streamUrl, setStreamUrl] = useState(false);
            const [isReconnecting, setIsReconnecting] = useState(false);

            useEffect(() => {
                if(isOpen) setStreamUrl(buildUrl('/video_feed'));
            }, [isOpen]);

            if (!isOpen) return null;
            
            const handleError = () => {
                setIsReconnecting(true);
                setTimeout(() => {
                    const timestamp = new Date().getTime();
                    setStreamUrl(buildUrl(`/video_feed?t=${timestamp}`));
                }, 3000);
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-sm p-6">
                    <div className="bg-dark-card w-full max-w-6xl rounded-2xl overflow-hidden shadow-2xl shadow-brand-500/10 flex flex-col max-h-[95vh] border border-dark-border">
                        <div className="flex justify-between items-center p-6 border-b border-dark-border">
                            <h2 className="text-2xl font-bold flex items-center gap-3 text-white">
                                <span className="w-3 h-3 rounded-full bg-accent-red animate-pulse shadow-[0_0_10px_#ef4444]" /> 
                                Live Screen Stream
                            </h2>
                            <button onClick={onClose} className="p-2 hover:bg-dark-bg rounded-lg text-dark-text hover:text-white font-bold transition-colors">✕ Close</button>
                        </div>
                        <div className="flex-1 bg-[#0a0a0a] overflow-hidden flex items-center justify-center p-4 relative min-h-[500px]">
                           {streamUrl && (
                               <img 
                                    src={streamUrl} 
                                    alt="Live Stream" 
                                    className="w-full h-full object-contain rounded-lg"
                                    onLoad={() => setIsReconnecting(false)}
                                    onError={handleError}
                               />
                           )}
                           
                           {isReconnecting && (
                               <div className="absolute inset-0 bg-black/80 flex flex-col items-center justify-center text-white backdrop-blur-sm">
                                   <div className="loader w-10 h-10 mb-4" />
                                   <div className="text-xl font-bold">Reconnecting lost frame...</div>
                               </div>
                           )}
                        </div>
                        <div className="p-6 bg-dark-bg border-t border-dark-border flex justify-end gap-4 items-center">
                            <span className="text-sm text-dark-text font-mono mr-auto flex items-center gap-2">
                                <span className="w-2 h-2 bg-accent-green rounded-full"></span> Encrypted Feed active
                            </span>
                            <button onClick={async () => { await fetch(buildUrl('/stop_stream')); onClose(); }} className="px-6 py-3 bg-accent-red hover:bg-red-600 text-white font-semibold rounded-xl transition-colors shadow-lg shadow-accent-red/20">
                                Terminate Stream
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState("dashboard");
            const [isScreenShareOpen, setScreenShareOpen] = useState(false);
            const [stats, setStats] = useState(null);
            const [cpuHistory, setCpuHistory] = useState([]);
            const [toasts, setToasts] = useState([]);
            const [loadingScript, setLoadingScript] = useState(null);

            const addToast = useCallback((message, type) => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 3000);
            }, []);

            // Poll API
            useEffect(() => {
                let mounted = true;
                const fetchStats = async () => {
                    try {
                        const res = await fetch(buildUrl('/api/stats'));
                        if(!res.ok) throw new Error("Backend connection failed");
                        
                        const data = await res.json();
                        if (!mounted) return;
                        
                        setStats(data);
                        
                        const now = new Date();
                        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                        
                        setCpuHistory(prev => {
                            const newHistory = [...prev, { time: timeStr, cpu: data.cpu }];
                            return newHistory.slice(-25); // Limit to ~25 points for neat UI
                        });
                    } catch (err) {
                        console.error("Stats fetching failed:", err);
                    }
                };
                
                fetchStats();
                const int = setInterval(fetchStats, 2000);
                return () => { mounted = false; clearInterval(int); };
            }, []);

            const handleRunScript = async (scriptName) => {
                if (scriptName === "Screen Share") {
                    setScreenShareOpen(true);
                    return;
                }
                setLoadingScript(scriptName);
                try {
                    const res = await fetch(buildUrl(`/run/${scriptName}`));
                    const data = await res.json();
                    if(data.success === false) {
                         addToast(data.message || "Unauthorized execution", "error");
                    } else {
                         addToast(data.message || `${scriptName} executed successfully`, "success");
                    }
                } catch (err) {
                    addToast(`Error executing: ${err.message}`, "error");
                }
                setLoadingScript(null);
            };

            const renderContent = () => {
                switch(activeTab) {
                    case "dashboard":
                        return <DashboardView stats={stats} openScreenShare={() => setScreenShareOpen(true)} scripts={window.flaskData.scripts || []} handleRun={handleRunScript} loadingScript={loadingScript} />;
                    case "hardware":
                        return <HardwareView stats={stats} cpuHistory={cpuHistory} />;
                    case "network":
                        return <NetworkView stats={stats} />;
                    default:
                        return <DashboardView stats={stats} openScreenShare={() => setScreenShareOpen(true)} scripts={window.flaskData.scripts || []} handleRun={handleRunScript} loadingScript={loadingScript} />;
                }
            };

            return (
                <div className="flex h-screen bg-dark-bg text-dark-heading overflow-hidden font-sans">
                    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} />
                    
                    <main className="flex-1 flex flex-col h-full pl-6 pt-6">
                        {renderContent()}
                    </main>

                    <ScreenShareModal isOpen={isScreenShareOpen} onClose={() => setScreenShareOpen(false)} addToast={addToast} />
                    <ToastContainer toasts={toasts} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        // {% endraw %}
    </script>
</body>
</html>
